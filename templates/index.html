<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>재고조사</title>

<style>
body { font-family:sans-serif; padding:20px; background:#f0f9f4; }
.card { background:white; padding:15px; border-radius:12px; margin-top:10px; }
input { width:100%; padding:14px; font-size:18px; margin-top:8px; }
button { width:100%; padding:14px; margin-top:8px; background:#66bb6a; color:white; border:none; }
</style>
</head>

<body>

<form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file">
    <button type="submit">엑셀 업로드</button>
</form>

<div class="card">
    <!-- 🔥 랙 스캔 -->
    <input id="rack" placeholder="랙 바코드" onkeydown="rackEnter(event)" autofocus>

    <!-- 🔥 상품 스캔 -->
    <input id="product" placeholder="상품 바코드" onkeydown="scanEnter(event)">
</div>

<div id="app"></div>

<button onclick="download()">다운로드</button>
<button onclick="share()">공유</button>

<script>
let data = {{ data|tojson }};

// 🔥 초기 설정
window.onload = function(){
    if(data.length > 0){
        document.getElementById('uploadForm').style.display = 'none';
    }

    // 항상 랙부터 시작
    document.getElementById('rack').focus();
}
</script>

<script src="/static/script.js"></script>

</body>
</html>
